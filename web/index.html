<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Goa House Designer</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css" />
<style>
  :root {
    --bg: #1b1d22;
    --panel: #23262d;
    --text: #e9e9ea;
    --muted: #9aa0a6;
    --accent: #d97757;
    --border: #2d3038;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); font: 14px/1.45 system-ui, -apple-system, Segoe UI, sans-serif; }
  .app { display: grid; grid-template-columns: 280px 1fr 320px; grid-template-rows: 48px 1fr; height: 100vh; }
  header { grid-column: 1 / -1; display: flex; align-items: center; gap: 12px; padding: 0 16px; background: var(--panel); border-bottom: 1px solid var(--border); }
  header h1 { font-size: 15px; font-weight: 600; margin: 0; }
  header .sub { color: var(--muted); font-size: 12px; }
  header label { color: var(--muted); font-size: 12px; margin-left: auto; }
  header select { background: #2a2d35; color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 4px 8px; font: inherit; }
  aside { background: var(--panel); border-right: 1px solid var(--border); overflow-y: auto; }
  aside.right { border-right: none; border-left: 1px solid var(--border); }
  aside h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin: 14px 12px 8px; }
  .room-list { list-style: none; margin: 0; padding: 0 6px; }
  .room-list li { padding: 8px 10px; margin: 2px 0; border-radius: 6px; cursor: pointer; border: 1px solid transparent; }
  .room-list li:hover { background: #2a2d35; }
  .room-list li.active { background: #2f343e; border-color: var(--accent); }
  .room-list li small { display: block; color: var(--muted); font-size: 11px; }
  main { position: relative; background: #0d0e11; }
  #panorama { width: 100%; height: 100%; }
  .topdown { padding: 10px; }
  .topdown img { width: 100%; border-radius: 6px; border: 1px solid var(--border); background: #fff; }
  .panel-block { padding: 10px 14px; border-top: 1px solid var(--border); }
  .panel-block h3 { font-size: 13px; margin: 0 0 6px; }
  .panel-block p { margin: 2px 0; color: var(--muted); font-size: 12px; }
  .chips { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
  .chip { background: #2a2d35; border: 1px solid var(--border); padding: 2px 8px; border-radius: 999px; font-size: 11px; color: var(--muted); }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>Goa House Designer</h1>
    <span class="sub" id="design-sub"></span>
    <label for="design-select">Design</label>
    <select id="design-select"></select>
  </header>
  <aside class="left">
    <h2>Rooms</h2>
    <ul id="rooms" class="room-list"></ul>
    <div class="topdown">
      <h2>Plan</h2>
      <img id="topdown" alt="top-down plan" />
    </div>
  </aside>
  <main>
    <div id="panorama"></div>
  </main>
  <aside class="right">
    <h2>Current room</h2>
    <div class="panel-block" id="room-info"><p>Loading…</p></div>
    <h2>Style</h2>
    <div class="panel-block" id="style-info"></div>
  </aside>
</div>
<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
